  <!-- footer legend -->
  <text x="64" y="958" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#8a8d93">Key flows:  Browser ⇄ Next.js (HTTPS)   ·   Actions/RSC ⇄ Postgres (RLS)   ·   Stripe webhook -> license state   ·   Cron */5 -> API-Football -> auto-scoring   ·   Auth (Google/OTP) -> Resend SMTP</text>

    <text x="84" y="728" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#8a8d93">Postgres — organizations, licenses, leagues,</text><text x="84" y="752" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#8a8d93">members, matches, predictions (+ leaderboard view)</text><text x="84" y="776" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#8a8d93">Row-Level Security (email-based) · triggers</text><text x="84" y="800" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#8a8d93"></text><text x="84" y="824" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#8a8d93">Auth — magic link · email OTP · Google OAuth</text><text x="84" y="848" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#8a8d93">Custom SMTP -&gt; Resend</text>

  <!-- external services -->
  
    <rect x="856" y="668" width="680" height="256" rx="14" fill="#14161a" stroke="#2a2d33" stroke-width="1.5"/>
